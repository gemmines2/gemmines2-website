<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemmines2 Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:Montserrat; background:#0b0f25; color:#fff; margin:0; }

header { padding:15px; background:#0a0a0a; color:#20B2AA; display:flex; justify-content:space-between; }

.container { max-width:800px; margin:120px auto; padding:20px; }

input { width:100%; padding:12px; margin:6px 0; background:#050a1a; color:#fff; border:1px solid #333; }

button { width:100%; padding:15px; background:#20B2AA; border:none; font-weight:bold; cursor:pointer; }

</style>
</head>

<body>

<header>
<strong>Gemmines2 Checkout</strong>
</header>

<div class="container">

<h2>Order Summary</h2>
<div id="summary"></div>
<h3 id="total"></h3>

<h2>Shipping Details</h2>

<form id="form">

<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>
<input id="contact" placeholder="Contact" required>
<input id="address" placeholder="Address" required>
<input id="city" placeholder="City" required>
<input id="state" placeholder="State" required>
<input id="zip" placeholder="ZIP" required>
<input id="country" placeholder="Country" required>

<button type="submit">PLACE ORDER</button>

</form>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

let summary = document.getElementById("summary");
let totalBox = document.getElementById("total");

let total = 0;

cart.forEach(i => {
  let qty = i.qty || 1;
  let price = Number(i.price || 0);
  total += qty * price;
  summary.innerHTML += `<div>${i.name} x ${qty}</div>`;
});

totalBox.innerText = "Total: $" + total.toFixed(2);

document.getElementById("form").addEventListener("submit", async (e) => {
e.preventDefault();

let orderID = "GM-" + Date.now();

let data = {
  orderID,
  name: name.value,
  email: email.value,
  contact: contact.value,
  address: address.value,
  city: city.value,
  state: state.value,
  zip: zip.value,
  country: country.value,
  items: cart,
  total: total.toFixed(2)
};

// Save for thank you page (IMPORTANT FIX)
localStorage.setItem("lastOrder", JSON.stringify(data));

// Send to Formspree
fetch("https://formspree.io/f/xwvylqrk", {
  method: "POST",
  headers: {"Content-Type":"application/json"},
  body: JSON.stringify(data)
});

// WhatsApp
let msg =
`Order ${orderID}
Name: ${data.name}
Total: $${data.total}`;

window.open("https://wa.me/923362149415?text=" + encodeURIComponent(msg), "_blank");

localStorage.removeItem("cart");

setTimeout(() => {
  window.location.href = "thankyou.html";
}, 1200);

});
</script>

</body>
</html>
