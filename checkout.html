<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemmines2 Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family:'Montserrat', sans-serif; background:#0b0f25; color:#fff; margin:0; }

header {
  position:fixed; top:0; left:0; right:0;
  background:#0a0a0a;
  border-bottom:1.5px solid #20B2AA;
  padding:10px 5%;
  display:flex; justify-content:space-between; align-items:center;
  z-index:1000;
}

header .logo {
  font-family:'Cinzel'; font-size:1.5rem;
  color:#20B2AA; text-decoration:none;
}

header nav a {
  margin:0 12px; color:#20B2AA;
  text-decoration:none;
  font-family:'Cinzel';
  font-size:0.8rem;
}

.container {
  max-width:800px;
  margin:110px auto 40px;
  background:#0a1430;
  padding:30px;
  border-radius:10px;
  border:1px solid rgba(32,178,170,0.2);
}

h1,h2 { text-align:center; font-family:'Cinzel'; color:#20B2AA; }

#order-summary {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  margin-bottom:25px;
}

label {
  display:block;
  margin-top:15px;
  color:#20B2AA;
  font-weight:600;
}

input {
  width:100%;
  padding:12px;
  margin-top:5px;
  border-radius:6px;
  border:1px solid #333;
  background:#050a1a;
  color:#fff;
  box-sizing:border-box;
}

.address-row { display:flex; gap:10px; }

.payment-options {
  margin:15px 0;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
}

.payment-fields {
  display:none;
  padding:10px;
  background:rgba(0,0,0,0.2);
  border-radius:6px;
}

button {
  width:100%;
  padding:15px;
  background:#20B2AA;
  color:#000;
  font-size:18px;
  border:none;
  border-radius:8px;
  font-family:'Cinzel';
  font-weight:bold;
  cursor:pointer;
}

button:hover { background:#17968f; }

footer {
  background:#030610;
  padding:40px 5%;
  border-top:2px solid #20B2AA;
  text-align:center;
  margin-top:50px;
}
</style>
</head>

<body>

<header>
  <a class="logo" href="index.html">Gemmines2</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
  </nav>
</header>

<div class="container">

<h1>Checkout</h1>

<div id="order-summary">
  <h2>Order Summary</h2>
  <div id="summary-items"></div>
  <h3 id="summary-total"></h3>
</div>

<form id="checkout-form">

<h2>Shipping Details</h2>

<label>Full Name</label>
<input id="name" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Contact</label>
<input id="contact" required>

<label>Address</label>
<input id="address" required>

<label>Address 2</label>
<input id="address2">

<div class="address-row">
  <input id="city" placeholder="City" required>
  <input id="state" placeholder="State" required>
</div>

<div class="address-row">
  <input id="zip" placeholder="ZIP" required>
  <input id="country" placeholder="Country" required>
</div>

<h2>Payment</h2>

<div class="payment-options">
  <label><input type="radio" name="payment" value="bank" checked> Bank Transfer</label>
  <label><input type="radio" name="payment" value="payoneer"> Payoneer</label>
</div>

<button id="placeOrderBtn">PLACE ORDER</button>

</form>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let summary = document.getElementById("summary-items");
let totalBox = document.getElementById("summary-total");

let total = 0;

cart.forEach(i => {
  let qty = i.qty || 1;
  let price = Number(i.price) || 0;
  let t = qty * price;
  total += t;

  summary.innerHTML += `<div>${i.name} x ${qty} = $${t.toFixed(2)}</div>`;
});

totalBox.innerText = "Total: $" + total.toFixed(2);

document.getElementById("checkout-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  let btn = document.getElementById("placeOrderBtn");
  btn.disabled = true;
  btn.innerText = "Processing...";

  let orderID = "GM-" + Date.now();

  let data = {
    order_id: orderID,
    name: name.value,
    email: email.value,
    contact: contact.value,
    address: address.value,
    address2: address2.value,
    city: city.value,
    state: state.value,
    zip: zip.value,
    country: country.value,
    items: cart.map(i => `${i.name} x ${i.qty || 1}`).join(", "),
    total: "$" + total.toFixed(2),
    payment: document.querySelector('input[name="payment"]:checked').value
  };

  try {
    let res = await fetch("https://formspree.io/f/xwvylqrk", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify(data)
    });

    if (!res.ok) {
      console.log("Formspree failed");
    }

  } catch(err) {
    console.log("Error:", err);
  }

  let msg =
`New Order ${orderID}
Name: ${data.name}
Contact: ${data.contact}
Total: ${data.total}`;

  window.open("https://wa.me/923362149415?text=" + encodeURIComponent(msg), "_blank");

  localStorage.removeItem("cart");

  setTimeout(() => {
    window.location.href = "thankyou.html";
  }, 1500);

});

});
</script>

</body>
</html>
