<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemmines2 Checkout</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Montserrat', sans-serif; background:#0b0f25; color:#fff; margin:0; }

/* HEADER */
header {
  position:fixed;
  top:0; left:0; right:0;
  background:#0a0a0a;
  border-bottom:1.5px solid #20B2AA;
  padding:10px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

header .logo {
  font-family:'Cinzel', serif;
  font-size:1.5rem;
  color:#20B2AA;
  text-decoration:none;
}

header nav a {
  margin:0 12px;
  color:#20B2AA;
  text-decoration:none;
  font-family:'Cinzel', serif;
  font-size:0.8rem;
  font-weight:bold;
}

/* CONTAINER */
.container {
  max-width:800px;
  margin:110px auto 40px;
  background:#0a1430;
  padding:30px;
  border-radius:10px;
  border:1px solid rgba(32,178,170,0.2);
}

h1, h2 {
  text-align:center;
  font-family:'Cinzel', serif;
  color:#20B2AA;
}

/* SUMMARY */
#order-summary {
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
  margin-bottom:25px;
}

#summary-items div {
  margin-bottom:10px;
}

/* FORM */
form label {
  display:block;
  margin-bottom:5px;
  font-weight:600;
  color:#20B2AA;
  font-size:0.8rem;
}

form input {
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:6px;
  border:1px solid #333;
  background:#050a1a;
  color:#fff;
}

/* ROW */
.address-row {
  display:flex;
  gap:10px;
}

/* PAYMENT */
.payment-options {
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:8px;
  margin-bottom:15px;
}

.payment-fields {
  display:none;
  padding:15px;
  background:rgba(0,0,0,0.2);
  border-radius:6px;
  margin-bottom:15px;
}

/* BUTTON */
button {
  width:100%;
  padding:15px;
  background:#20B2AA;
  color:#000;
  font-size:18px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-family:'Cinzel', serif;
  font-weight:bold;
}

button:hover { background:#17968f; }

/* FOOTER */
footer {
  background:#030610;
  padding:30px 5%;
  border-top:1.5px solid #20B2AA;
  text-align:center;
}

.footer-links a {
  color:#20B2AA;
  text-decoration:none;
  margin:0 8px;
  font-size:12px;
  font-weight:600;
  text-transform:uppercase;
}

.footer-copy {
  font-size:11px;
  color:#6c757d;
  margin-top:15px;
}

@media(max-width:600px){
  .address-row { flex-direction:column; }
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="logo">Gemmines2</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="container">

<h1>Checkout</h1>

<!-- ORDER SUMMARY -->
<div id="order-summary">
  <h2>Order Summary</h2>
  <div id="summary-items"></div>
  <h3 id="summary-total" style="text-align:right;"></h3>
</div>

<form id="checkout-form">

<h2>Shipping Details</h2>

<label>Full Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>Contact (WhatsApp)</label>
<input type="text" id="contact" required>

<label>Address</label>
<input type="text" id="address" required>

<div class="address-row">
  <input type="text" id="city" placeholder="City" required>
  <input type="text" id="country" placeholder="Country" required>
</div>

<h2>Payment Method</h2>

<div class="payment-options">
  <label><input type="radio" name="payment" value="card" checked> Credit/Debit Card</label><br>
  <label><input type="radio" name="payment" value="bank"> Bank Transfer</label>
</div>

<div id="card-display" class="payment-fields" style="display:block;">
  <input type="text" placeholder="Card Number">
  <div class="address-row">
    <input type="text" placeholder="MM/YY">
    <input type="text" placeholder="CVV">
  </div>
</div>

<div id="bank-display" class="payment-fields">
  <input type="text" placeholder="Bank Name">
  <input type="text" placeholder="Account Number">
  <input type="text" placeholder="IBAN / SWIFT Code">
</div>

<button type="submit">PLACE ORDER</button>

</form>
</div>

<footer>
  <div class="footer-links">
    <a href="index.html">Home</a> | 
    <a href="products.html">Products</a> | 
    <a href="return.html">Returns</a> | 
    <a href="shipping.html">Shipping</a> | 
    <a href="privacy.html">Privacy</a> | 
    <a href="contact.html">Contact</a> | 
    <a href="terms.html">Terms</a>
  </div>
  <div class="footer-copy">
    © 2026 Gemmines2 | Mohamed Yousef Zubair | Islamabad, Pakistan
  </div>
</footer>

<script>

/* ORDER SUMMARY */
let cart = JSON.parse(localStorage.getItem('cart')) || [];
let summaryContainer = document.getElementById('summary-items');
let totalContainer = document.getElementById('summary-total');

let total = 0;

cart.forEach(item => {
  let itemTotal = item.price * item.quantity;
  total += itemTotal;

  let div = document.createElement('div');
  div.innerHTML = `${item.name} - Rs ${item.price} x ${item.quantity} = Rs ${itemTotal}`;
  summaryContainer.appendChild(div);
});

totalContainer.innerHTML = `Total: Rs ${total}`;

/* PAYMENT TOGGLE */
const radios = document.querySelectorAll('input[name="payment"]');
const cardDisplay = document.getElementById('card-display');
const bankDisplay = document.getElementById('bank-display');

radios.forEach(radio => {
  radio.addEventListener('change', (e) => {
    cardDisplay.style.display = 'none';
    bankDisplay.style.display = 'none';

    if(e.target.value === 'card') cardDisplay.style.display = 'block';
    if(e.target.value === 'bank') bankDisplay.style.display = 'block';
  });
});

/* WHATSAPP ORDER */
document.getElementById('checkout-form').addEventListener('submit', function(e) {
  e.preventDefault();

  const name = document.getElementById('name').value;
  const email = document.getElementById('email').value;
  const contact = document.getElementById('contact').value;
  const address = document.getElementById('address').value;
  const city = document.getElementById('city').value;
  const country = document.getElementById('country').value;

  const payment = document.querySelector('input[name="payment"]:checked').value;

  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  let items = "";
  let total = 0;

  cart.forEach(item => {
    let itemTotal = item.price * item.quantity;
    total += itemTotal;
    items += `${item.name} - Rs ${item.price} x ${item.quantity} = Rs ${itemTotal}%0A`;
  });

  let message = `*New Order - Gemmines2*%0A%0A`
    + `Name: ${name}%0A`
    + `Email: ${email}%0A`
    + `Contact: ${contact}%0A`
    + `Address: ${address}, ${city}, ${country}%0A%0A`
    + `Payment: ${payment}%0A%0A`
    + `Order:%0A${items}%0A`
    + `Total: Rs ${total}`;

  let phone = "923362149415";

  let url = `https://wa.me/${phone}?text=${message}`;

  window.location.href = url;
});

</script>

</body>
</html>
