<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products | Gemmines2</title>
  <style>
    :root { --teal: #20B2AA; --bg: #050a1a; --card: #1a1f40; }
    body { font-family: Arial, sans-serif; background-color: var(--bg); color: #f0f0f0; margin: 0; padding: 0; }
    
    header { background-color: #0a0a0a; border-bottom: 2px solid var(--teal); padding: 15px 0; text-align: center; }
    header h1 { color: var(--teal); margin: 0; }
    header nav a { color: var(--teal); text-decoration: none; margin: 0 10px; font-weight: bold; }

    .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
    
    /* RESTORED ORIGINAL GRID SIZE */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0; }
    .product-card { background: var(--card); border-radius: 12px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .product-card img { width: 180px; height: 180px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
    .product-card h3 { color: #00ffe0; font-size: 1rem; margin: 6px 0; }
    .price { color: #00e0ff; font-weight: 700; margin-bottom: 8px; }

    /* SINGLE PRODUCT VIEW */
    #single-product-view { display: none; text-align: center; background: var(--card); padding: 40px; border-radius: 15px; border: 1px solid var(--teal); }
    #single-product-view img { width: 100%; max-width: 300px; border-radius: 10px; }

    .buy-btn { background: linear-gradient(135deg,#20B2AA,#c9a646); border: none; color: #000; font-weight: bold; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; }
    
    footer { background: #030610; padding: 40px 5%; border-top: 2px solid var(--teal); text-align: center; margin-top: 50px; }
    .footer-links a { color: var(--teal) !important; text-decoration: none; margin: 0 10px; font-size: 14px; font-weight: 600; }
  </style>
</head>
<body>

<header>
  <h1>Gemmines2</h1>
<nav>
  <a href="index.html">Home</a> |
  <a href="products.html">Products</a> |
  <a href="cart.html">Cart</a> |
  <a href="contact.html">Contact</a>
</nav>  
</header>

<div class="container">
  <div id="single-product-view">
    <div id="product-details"></div>
    <button class="buy-btn" style="width:200px; margin-top:20px;" onclick="window.location.href='products.html'">Back to Shop</button>
  </div>

  <div id="all-products-view">
    <h2 style="text-align:center; color:var(--teal);">Our Gemstone Collection</h2>
    <div class="products-grid" id="product-list"></div>
  </div>
</div>

<script src="products.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (id && products.find(p => p.id === id)) {
      showSingle(id);
    } else {
      showAll();
    }
  });

  function showAll() {
    const list = document.getElementById('product-list');
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'product-card';
      div.innerHTML = `
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <div class="price">$${p.price.toFixed(2)}</div>
        <button class="buy-btn" onclick="window.location.href='products.html?id=${p.id}'">View Gemstone</button>
      `;
      list.appendChild(div);
    });
  }

  function showSingle(id) {
    const p = products.find(prod => prod.id === id);
    document.getElementById('all-products-view').style.display = 'none';
    const view = document.getElementById('single-product-view');
    view.style.display = 'block';
    document.getElementById('product-details').innerHTML = `
      <img src="${p.image}">
      <h2 style="color:var(--teal)">${p.name}</h2>
      <p style="color:#b7c7d3">${p.description}</p>
      <div class="price" style="font-size:1.5rem">$${p.price.toFixed(2)}</div>
      <button class="buy-btn" style="max-width:300px" onclick="addToCart('${p.id}')">Add to Cart & Buy</button>
    `;
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (!cart.find(item => item.id === id)) { cart.push({...product, qty: 1}); }
    localStorage.setItem('cart', JSON.stringify(cart));
    window.location.href = 'cart.html';
  }
</script>

    <a href="return.html" style="color: #20B2AA; text-decoration: none; margin: 0 10px; font-size: 14px; font-weight: 600;">Returns</a> | 
    <a href="shipping.html" style="color: #20B2AA; text-decoration: none; margin: 0 10px; font-size: 14px; font-weight: 600;">Shipping</a> | 
    <a href="privacy.html" style="color: #20B2AA; text-decoration: none; margin: 0 10px; font-size: 14px; font-weight: 600;">Privacy</a> | 
    <a href="contact.html" style="color: #20B2AA; text-decoration: none; margin: 0 10px; font-size: 14px; font-weight: 600;">Contact</a> | 
    <a href="terms.html" style="color: #20B2AA; text-decoration: none; margin: 0 10px; font-size: 14px; font-weight: 600;">Terms</a>
  </div>
  <p style="color:#fff; font-size: 14px;">Address: House # 602, Gali # 6, Sector G11/1, Islamabad, Pakistan</p>
  <p style="color:#fff; font-size: 14px;">© 2026 Gemmines2 | Owned & Operated by Mohamed Yousef Zubair</p>
</footer>

</body>
</html>
