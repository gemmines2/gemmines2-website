<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemstones Shop | Gemmines2</title>

<link href="https://googleapis.com" rel="stylesheet">

<style>
:root { --teal: #20B2AA; --bg: #050a1a; --card: #1a1f40; --header-bg: #0a0a0a; }
body { font-family:'Montserrat', sans-serif; background:var(--bg); color:#fff; margin:0; padding:0; line-height:1.6; }

header {
  position:fixed; top:0; left:0; right:0;
  background:var(--header-bg);
  border-bottom:1.5px solid var(--teal);
  padding:15px 5%;
  display:flex; justify-content:space-between; align-items:center;
  z-index:1000;
}

header .logo a {
  font-family:'Cinzel', serif; font-size:1.4rem;
  color:var(--teal); text-decoration:none; letter-spacing:1px;
}

header nav a {
  margin-left:20px; color:var(--teal);
  text-decoration:none; font-family:'Cinzel', serif; font-size:0.85rem; font-weight:700;
}

.shop-container {
  max-width:1200px;
  margin:120px auto 60px;
  padding:0 20px;
}

.shop-container h1 {
  text-align:center; font-family:'Cinzel', serif; color:var(--teal); margin-bottom:40px;
}

.products-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
  gap:30px;
}

.product-card {
  background:var(--card);
  border:1px solid rgba(32,178,170,0.15);
  border-radius:12px;
  padding:20px;
  display:flex; flex-direction:column; justify-content:space-between;
  transition:transform 0.2s, border-color 0.2s;
}

.product-card:hover {
  transform:translateY(-5px); border-color:var(--teal);
}

.product-img {
  width:100%; height:220px; object-fit:cover; border-radius:8px;
  background:#020612; margin-bottom:15px;
}

.product-title {
  font-family:'Cinzel', serif; font-size:1.05rem; color:var(--teal); margin:10px 0; min-height:50px;
}

.product-desc {
  font-size:0.88rem; color:#ced4da; margin-bottom:15px; flex-grow:1;
}

.product-meta {
  font-size:0.8rem; color:#aaa; margin-bottom:12px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;
}

.price-row {
  display:flex; justify-content:space-between; align-items:center; margin-top:10px;
}

.product-price {
  font-size:1.25rem; font-weight:700; color:#fff;
}

.buy-btn {
  background:var(--teal); color:#000; border:none; padding:10px 18px;
  border-radius:6px; font-weight:700; font-family:'Cinzel', serif; cursor:pointer; font-size:0.85rem;
}

.buy-btn:hover { background:#17968f; }

footer { background:#030610; padding:40px 5%; border-top:2px solid var(--teal); text-align:center; margin-top:80px; }
.footer-links a { color:var(--teal); text-decoration:none; margin:0 10px; font-size:13px; font-weight:600; }
.footer-info p { color:#fff; font-size:13px; margin:5px 0; }
</style>
</head>

<body>

<header>
  <div class="logo">
    <a href="index.html"><strong>Gemmines2</strong></a>
  </div>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="shop-container">
  <h1>Natural Gemstone Inventory</h1>
  <div class="products-grid" id="products-display-grid"></div>
</div>

<footer>
  <div class="footer-links">
    <a href="index.html">Home</a> | 
    <a href="products.html">Products</a> | 
    <a href="return.html">Returns &amp; Refund Policy</a> | 
    <a href="shipping.html">Shipping</a> | 
    <a href="privacy.html">Privacy</a> | 
    <a href="contact.html">Contact</a> | 
    <a href="terms.html">Terms</a>
  </div>
  <div class="footer-info">
    <p>Address: House # 602, Gali # 6, Sector G11/1, Islamabad, Federal, 44000 Pakistan</p>
    <p>© 2026 Gemmines2 | Owned &amp; Operated by Mohamed Yousef Zubair</p>
  </div>
</footer>

<!-- SYSTEM CONNECTION LINKS (DO NOT REMOVE) -->
<script src="products-data.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  const displayGrid = document.getElementById('products-display-grid');
  
  if (!displayGrid) return;
  displayGrid.innerHTML = '';

  // Rendering engine matching GMC Data ID values dynamically
  if (typeof products !== 'undefined' && products.length > 0) {
    products.forEach(item => {
      const card = document.createElement('div');
      card.className = 'product-card';
      
      card.innerHTML = `
        <img src="${item.image}" alt="${item.name}" class="product-img" onerror="this.src='images/logo.png'">
        <div class="product-title">${item.name}</div>
        <div class="product-desc">${item.description}</div>
        <div class="product-meta">
          Origin: ${item.origin} | Treatment: ${item.treatment} <br>
          SKU: ${item.id}
        </div>
        <div class="price-row">
          <span class="product-price">$${Number(price = item.price).toFixed(2)} USD</span>
          <button class="buy-btn" onclick="addToCart('${item.id}', '${item.name.replace(/'/g, "\\'")}', ${item.price}, '${item.image}')">BUY NOW</button>
        </div>
      `;
      displayGrid.appendChild(card);
    });
  } else {
    displayGrid.innerHTML = '<p style="text-align:center; width:100%;">Inventory data synchronization processing. Please reload page.</p>';
  }
});

// Shopping Cart array connection layout routing
function addToCart(id, name, price, image) {
  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  let existingItem = cart.find(item => item.id === id);

  if (existingItem) {
    existingItem.qty = (existingItem.qty || 1) + 1;
  } else {
    cart.push({ id: id, name: name, price: price, image: image, qty: 1 });
  }

  localStorage.setItem('cart', JSON.stringify(cart));
  window.location.href = "cart.html";
}
</script>

</body>
</html>
