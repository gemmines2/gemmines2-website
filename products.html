<script>
  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (id && products.find(p => p.id === id)) {
      showSingle(id);
    } else {
      showAll();
    }
  });

  function showAll() {
    const list = document.getElementById('product-list');
    products.forEach(p => {
      const div = document.createElement('div');
      div.className = 'product-card';
      div.innerHTML = `
        <img src="${p.image}" alt="${p.name}">
        <h3>${p.name}</h3>
        <div class="price">$${p.price.toFixed(2)}</div>
        <button class="buy-btn" onclick="window.location.href='products.html?id=${p.id}'">View Gemstone</button>
      `;
      list.appendChild(div);
    });
  }

  function showSingle(id) {
    const p = products.find(prod => prod.id === id);
    document.getElementById('all-products-view').style.display = 'none';
    const view = document.getElementById('single-product-view');
    view.style.display = 'block';
    document.getElementById('product-details').innerHTML = `
      <img src="${p.image}">
      <h2 style="color:var(--teal)">${p.name}</h2>
      <p style="color:#b7c7d3">${p.description}</p>
      <div class="price" style="font-size:1.5rem">$${p.price.toFixed(2)}</div>
      <button class="buy-btn" style="max-width:300px" onclick="addToCart('${p.id}')">Add to Cart & Buy</button>
    `;
  }

  function addToCart(id) {
    const product = products.find(p => p.id === id);
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (!cart.find(item => item.id === id)) { cart.push({...product, qty: 1}); }
    localStorage.setItem('cart', JSON.stringify(cart));
    window.location.href = 'cart.html';
  }
