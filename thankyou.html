
<!DOCTYPE html>
<html>
<head>
<title>Thank You</title>
</head>

<body style="background:#0b0f25;color:white;text-align:center;padding:50px;font-family:Arial;">

<h1>Thank You for Your Order!</h1>

<p>Order ID: <span id="oid"></span></p>
<p>Total: $<span id="total"></span> USD</p>

<script>
let data = JSON.parse(localStorage.getItem("lastOrder"));

if(data){
  document.getElementById("oid").innerText = data.orderID;
  document.getElementById("total").innerText = data.total;
}else{
  document.getElementById("oid").innerText = "N/A";
  document.getElementById("total").innerText = "0.00";
}
</script>

</body>
</html>
