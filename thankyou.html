
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #0b0f25;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      flex-direction: column;
      text-align: center;
      padding: 20px;
      margin: 0;
    }

    h1 {
      color: #20B2AA;
      font-family: 'Cinzel', serif;
      margin-bottom: 10px;
    }

    p {
      color: #ffffff;
      font-size: 16px;
    }

    .box {
      background: #0a1430;
      border: 1px solid rgba(32,178,170,0.3);
      padding: 20px;
      border-radius: 10px;
      margin-top: 15px;
      width: 100%;
      max-width: 500px;
    }

    a {
      background: #20B2AA;
      color: #000;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-weight: bold;
      display: inline-block;
      margin-top: 20px;
    }

    a:hover {
      background: #17968f;
    }

    .label {
      color: #20B2AA;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>Thank You for Your Order!</h1>

  <p>Your order has been successfully placed. We will contact you soon.</p>

  <div class="box">
    <p><span class="label">Order ID:</span> <span id="order-id"></span></p>
    <p><span class="label">Order Details:</span></p>
    <p id="order-summary"></p>
    <p><span class="label">Total:</span> $<span id="order-total"></span></p>
  </div>

  <a href="index.html">Return to Home</a>

  <script>
    const cart = JSON.parse(localStorage.getItem("lastOrder")) || [];
    localStorage.removeItem("lastOrder");

    const orderID = "GM-" + Date.now();

    let summary = cart.map(item =>
      `${item.name} x ${item.qty}`
    ).join("<br>");

    let total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);

    document.getElementById("order-id").innerHTML = orderID;
    document.getElementById("order-summary").innerHTML = summary;
    document.getElementById("order-total").innerHTML = total.toFixed(2);

    localStorage.removeItem("cart");
  </script>

</body>
</html>
