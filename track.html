<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order | Gemmines2</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Montserrat;
  background:#0b0f25;
  color:white;
}

/* HEADER */
header {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#0a0a0a;
  border-bottom:1.5px solid #20B2AA;
  padding:10px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

header .logo {
  font-family:Cinzel;
  color:#20B2AA;
  text-decoration:none;
  font-size:1.2rem;
}

header nav a {
  margin:0 10px;
  color:#20B2AA;
  text-decoration:none;
  font-family:Cinzel;
  font-size:0.85rem;
}

/* CONTAINER */
.container {
  max-width:600px;
  margin:120px auto;
  background:#0a1430;
  padding:30px;
  border-radius:10px;
  border:1px solid rgba(32,178,170,0.3);
  text-align:center;
}

h1 {
  font-family:Cinzel;
  color:#20B2AA;
}

input {
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:6px;
  border:none;
  outline:none;
}

button {
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#20B2AA;
  border:none;
  font-weight:bold;
  cursor:pointer;
  font-family:Cinzel;
}

#result {
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
  text-align:left;
  line-height:1.6;
}

/* FOOTER */
footer {
  background:#030610;
  padding:30px 5%;
  border-top:1.5px solid #20B2AA;
  text-align:center;
  margin-top:60px;
}

.footer-links a {
  color:#20B2AA;
  text-decoration:none;
  margin:0 6px;
  font-size:12px;
}

.footer-info, .footer-copy {
  font-size:12px;
  color:#ccc;
}

.payment-tags span {
  border:1px solid #20B2AA;
  padding:3px 6px;
  font-size:10px;
  margin:0 5px;
  display:inline-block;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo">Gemmines2</a>
  <nav>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
    <a href="cart.html">Cart</a>
    <a href="track.html">Track</a>
  </nav>
</header>

<!-- BODY -->
<div class="container">

<h1>Track Your Order</h1>

<p style="font-size:13px;color:#ccc;">
Enter your Order ID (example: GM-1777893217391)
</p>

<input type="text" id="orderId" placeholder="Enter Order ID">

<button onclick="trackOrder()">Track Order</button>

<div id="result"></div>

</div>

<!-- FOOTER -->
<footer>

  <div class="footer-links">
    <a href="index.html">Home</a> |
    <a href="products.html">Products</a> |
    <a href="return.html">Return Policy</a> |
    <a href="shipping.html">Shipping</a> |
    <a href="privacy.html">Privacy</a> |
    <a href="contact.html">Contact</a>
  </div>

  <div class="footer-info">
    <p>Islamabad, Pakistan</p>
    <p>WhatsApp: +92 336 214 9415</p>
  </div>

  <div class="payment-tags">
    <p style="font-size:10px;color:#aaa;">Secure Payments</p>
    <span>VISA</span>
    <span>PAYONEER</span>
    <span>BANK TRANSFER</span>
  </div>

  <p class="footer-copy">© 2026 Gemmines2</p>
</footer>

<!-- SCRIPT -->
<script>
function trackOrder() {

  let id = document.getElementById("orderId").value.trim();
  let result = document.getElementById("result");

  if (!id) {
    result.innerHTML = "<span style='color:red;'>Please enter your Order ID</span>";
    return;
  }

  result.innerHTML = "Checking order status...";

  setTimeout(() => {

    result.innerHTML = `
      <b>Order ID:</b> ${id}<br><br>

      <b>Status:</b> Processing / Payment Pending<br><br>

      <b>Next Step:</b><br>
      ✔ Payment verification in progress<br>
      ✔ WhatsApp update will be sent<br>
      ✔ Shipping after confirmation<br><br>

      <span style="color:#aaa;font-size:12px;">
        Real tracking system will be connected to database next upgrade.
      </span>
    `;
  }, 800);
}
</script>

</body>
</html>
