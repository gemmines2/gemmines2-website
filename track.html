<button onclick="trackOrder()">Track Order</button>

<script>
async function trackOrder() {
  let id = document.getElementById("orderId").value.trim();

  if (!id) {
    alert("GM-1777894314899 ");
    return;
  }

  document.getElementById("result").innerHTML = "Checking order...";

  // This is simple demo version (manual system)
  // Later we can connect Google Sheets API

  fetch("https://formspree.io/f/xwvylqrk") // dummy endpoint (we will upgrade later)
    .then(() => {

      // TEMP LOGIC (replace later with real API)
      document.getElementById("result").innerHTML = `
        <b>Order ID:</b> ${id}<br><br>
        <b>Status:</b> Processing / Pending<br><br>
        We will update your order status after payment confirmation.
      `;
    });
}
</script>
