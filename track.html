<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Order | Gemmines2</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Montserrat;
  background:#0b0f25;
  color:white;
}

header {
  background:#0a0a0a;
  padding:12px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid #20B2AA;
}

header a {
  color:#20B2AA;
  text-decoration:none;
  font-family:Cinzel;
  margin:0 10px;
  font-size:0.9rem;
}

.container {
  max-width:600px;
  margin:120px auto;
  background:#0a1430;
  padding:30px;
  border-radius:10px;
  border:1px solid rgba(32,178,170,0.3);
  text-align:center;
}

h1 {
  color:#20B2AA;
  font-family:Cinzel;
}

input {
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:6px;
  border:none;
  outline:none;
}

button {
  margin-top:15px;
  width:100%;
  padding:12px;
  background:#20B2AA;
  border:none;
  font-weight:bold;
  cursor:pointer;
  font-family:Cinzel;
}

#result {
  margin-top:20px;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:8px;
  text-align:left;
}
</style>
</head>

<body>

<header>
  <div style="color:#20B2AA;font-family:Cinzel;">Gemmines2</div>
  <div>
    <a href="index.html">Home</a>
    <a href="products.html">Products</a>
  </div>
</header>

<div class="container">

<h1>Track Your Order</h1>

<p>Enter your Order ID</p>

<input type="text" id="orderId" placeholder="Example: GM-1777893217391">

<button onclick="trackOrder()">Track Order</button>

<div id="result"></div>

</div>

<script>
function trackOrder() {

  let id = document.getElementById("orderId").value.trim();
  let result = document.getElementById("result");

  if (!id) {
    result.innerHTML = "<b style='color:red;'>Please enter your Order ID</b>";
    return;
  }

  result.innerHTML = "Checking order status...";

  // SIMULATED TRACKING (NO BACKEND YET)
  setTimeout(() => {

    result.innerHTML = `
      <b>Order ID:</b> ${id}<br><br>
      
      <b>Status:</b> Processing / Pending Payment<br><br>

      <b>What happens next?</b><br>
      ✔ We will verify your payment<br>
      ✔ You will receive WhatsApp update<br>
      ✔ Order will be shipped after confirmation<br><br>

      <small style="color:#aaa;">
      Real-time tracking will be enabled in next upgrade.
      </small>
    `;

  }, 800);
}
</script>

</body>
</html>
